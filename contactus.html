<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSRN</title>
    <style>
        .backbutton {
            padding: 15px 30px;
            font-size: 18px;
            outline: none;
            border: none;
            border-radius: 10px;
            transition: 0.5s;
            background: #1e1e1e;
            cursor: pointer;
            color: greenyellow;
            box-shadow: 0 0 10px #363636, inset 0 0 10px #363636;
            text-decoration: none; /* Remove underline from link */
            display: inline-block; /* Make link behave like a button */
        }
        
        .backbutton:hover {
            animation: a 1s 1 linear;
        }
        
        @keyframes a {
            0% {
                transform: scale(0.7, 1.3);
            }
            25% {
                transform: scale(1.3, 0.7);
            }
            50% {
                transform: scale(0.7, 1.3);
            }
            75% {
                transform: scale(1.3, 0.7);
            }
            100% {
                transform: scale(1, 1);
            }
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: 	#E5E4E2;
            margin: 0;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .testimonials {
            margin-bottom: 20px;
            padding: 20px;
            border: 2px solid greenyellow;
            border-radius: 10px;
            background-color: 	#E5E4E2;
        }
        
        .testimonials h2 {
            color: #1e1e1e;
            text-align: center;
        }
        
        blockquote {
            border-left: 4px solid greenyellow;
            margin: 10px 0;
            padding-left: 10px;
            font-style: italic;
            color: #555;
            text-align: center;
        }
    </style>

<style>
    body {
       margin: 0;
       height: 200vh; /* Allow for vertical scrolling */
       overflow: auto; /* Enable scrolling */
   
       background-image: 
           radial-gradient(circle at 10% 20%, rgb(231, 114, 25), rgba(255, 255, 0, 0.6)),
           radial-gradient(circle at 70% 30%, rgba(0, 255, 150, 0.6), rgba(0, 0, 255, 0.6)),
           radial-gradient(circle at 50% 50%, rgba(255, 157, 0, 0.872), rgba(0, 255, 255, 0.6)),
           radial-gradient(circle at 20% 80%, rgba(255, 0, 150, 0.6), rgba(255, 100, 0, 0.6)),
           radial-gradient(circle at 80% 20%, rgba(0, 100, 255, 0.6), rgba(0, 255, 100, 0.6)),
           radial-gradient(circle at 40% 60%, rgba(200, 0, 255, 0.6), rgba(255, 255, 255, 0.6));
   
       background-size: 200px 200px, 200px 200px, 200px 200px, 150px 150px, 150px 150px, 100px 100px;
       background-repeat: repeat;
   
       animation: fractalAnimation 5s infinite alternate; /* Keep animation */
   }
   
   @keyframes fractalAnimation {
       0% {
           background-size: 200px 200px, 200px 200px, 200px 200px, 150px 150px, 150px 150px, 100px 100px;
       }
       100% {
           background-size: 250px 250px, 250px 250px, 250px 250px, 200px 200px, 200px 200px, 150px 150px;
       }
   }
   
   /* Add some content to enable scrolling */
   .content {
       height: 200vh; /* Make content height equal to body height */
       display: flex;
       justify-content: center;
       align-items: center;
       color: #ffffff;
       font-size: 2rem;
   }
   
   
   
   </style>

</head>
<body>
    <header>
        <h1>
            <img src="logo.png" alt="WSRN Logo" width="200">
          </h1>
        <nav>
            <a class="backbutton" href="index.html">Back to homepage button --></a>
        </nav>
    </header>

    <section class="contact" style="margin-bottom: 20px; padding: 20px; border: 2px solid #39ff14; border-radius: 10px; background-color: #fff;">
        <h2 style="color: #39ff14; text-align: center;">Contact Us</h2>
        <p style="text-align: center;">
            We’re here to help! If you have any questions, need a quote, or just want to chat about our solutions, don’t hesitate to reach out. We’d love to hear from you! 
            You can email us anytime at <a href="mailto:example@email.com">example@email.com</a>.
        </p>
        
        <div style="text-align: center; margin: 20px 0;">
            <button onclick="location.href='mailto:example@email.com'" 
                    style="display: inline-flex; align-items: center; justify-content: center; outline: none; cursor: pointer; width: 150px; height: 50px; 
                    background-image: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%); border-radius: 30px; border: 1px solid #8F9092; 
                    transition: all 0.2s ease; font-family: 'Source Sans Pro', sans-serif; font-size: 14px; font-weight: 600; color: #606060; 
                    text-shadow: 0 1px #fff;">Email Us</button>
        </div>
    
        <h3 style="color: #39ff14; text-align: center;">Or Fill Out the Form Below</h3>
        <form style="max-width: 600px; margin: 0 auto;">
            <div style="margin-bottom: 15px;">
                <label for="name" style="display: block; margin-bottom: 5px;">Name:</label>
                <input type="text" id="name" name="name" required 
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label for="email" style="display: block; margin-bottom: 5px;">Email:</label>
                <input type="email" id="email" name="email" required 
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label for="message" style="display: block; margin-bottom: 5px;">Message:</label>
                <textarea id="message" name="message" required rows="4" 
                          style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
            </div>
            <div style="text-align: center;">
                <button type="submit" 
                        style="display: inline-flex; align-items: center; justify-content: center; outline: none; cursor: pointer; width: 150px; height: 50px; 
                        background-image: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%); border-radius: 30px; border: 1px solid #8F9092; 
                        transition: all 0.2s ease; font-family: 'Source Sans Pro', sans-serif; font-size: 14px; font-weight: 600; color: #606060; 
                        text-shadow: 0 1px #fff;">Send Message</button>
            </div>
        </form>
    </section>
    
</body>
</html>
